<!DOCTYPE html>
<html lang="pl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Podgląd ikon SVG</title>
	<style>
		:root {
			--bg: #0a0c11;
			--bg-panel: #1c2029;
			--bg-panel-hover: #262b38;
			--border: rgba(148, 166, 204, 0.16);
			--text: #eef1f8;
			--text-muted: #99a1b5;
			--red: #ff3352;
			--font-mono: 'IBM Plex Mono', ui-monospace, Consolas, monospace;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			padding: 32px;
			background: var(--bg);
			color: var(--text);
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
		}

		h1 {
			font-size: 1.4rem;
			margin: 0 0 4px;
		}

		h2 {
			font-family: var(--font-mono);
			font-size: 0.9rem;
			font-weight: 600;
			letter-spacing: 0.04em;
			text-transform: uppercase;
			color: var(--text-muted);
			margin: 36px 0 14px;
			padding-bottom: 8px;
			border-bottom: 1px solid var(--border);
		}

		.subtitle {
			color: var(--text-muted);
			font-size: 0.9rem;
			margin: 0;
		}

		.grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
			gap: 12px;
		}

		.card {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 10px;
			padding: 18px 10px;
			background: var(--bg-panel);
			border: 1px solid var(--border);
			border-radius: 10px;
			text-align: center;
			transition: background-color 0.15s ease, border-color 0.15s ease;
		}

		.card:hover {
			background: var(--bg-panel-hover);
			border-color: var(--red);
		}

		.card svg {
			width: 40px;
			height: 40px;
			color: var(--red);
			fill: currentColor;
			stroke: currentColor;
		}

		.card svg.stroke-only {
			fill: none;
		}

		.card code {
			font-family: var(--font-mono);
			font-size: 0.76rem;
			color: var(--text);
			word-break: break-all;
		}

		.card .bg {
			background: repeating-conic-gradient(#2a2f3c 0% 25%, #20242e 0% 50%) 50% / 14px 14px;
			border-radius: 8px;
			padding: 10px;
		}

		.empty {
			color: var(--text-muted);
			font-size: 0.85rem;
		}
	</style>
</head>
<body>
<h1>Podgląd ikon SVG</h1>
<p class="subtitle">Automatycznie wygenerowana lista wszystkich &lt;symbol&gt; z plików sprite w <code>/assets/icons/</code>.</p>

<div id="output"></div>

<script>
	const spriteFiles = [
		{ path: '/assets/icons/icons.svg', label: 'icons.svg (interfejs, linie)', strokeOnly: true },
		{ path: '/assets/icons/node-types.svg', label: 'node-types.svg (typy węzłów)', strokeOnly: false },
	];

	const output = document.getElementById('output');

	const renderSprite = async ({ path, label, strokeOnly }) => {
		const section = document.createElement('section');
		const heading = document.createElement('h2');
		heading.textContent = `${label} — ${path}`;
		section.appendChild(heading);

		let symbols = [];
		try {
			const res = await fetch(path);
			if (!res.ok) throw new Error(`HTTP ${res.status}`);
			const text = await res.text();
			const doc = new DOMParser().parseFromString(text, 'image/svg+xml');
			symbols = [...doc.querySelectorAll('symbol[id]')].map(s => s.id);
		}
		catch (e) {
			const err = document.createElement('p');
			err.className = 'empty';
			err.textContent = `Nie udało się wczytać ${path}: ${e.message}`;
			section.appendChild(err);
			output.appendChild(section);
			return;
		}

		if (!symbols.length) {
			const empty = document.createElement('p');
			empty.className = 'empty';
			empty.textContent = 'Brak symboli w tym pliku.';
			section.appendChild(empty);
			output.appendChild(section);
			return;
		}

		const grid = document.createElement('div');
		grid.className = 'grid';

		for (const id of symbols) {
			const card = document.createElement('div');
			card.className = 'card';
			card.innerHTML = `
				<div class="bg"><svg class="${strokeOnly ? 'stroke-only' : ''}"><use href="${path}#${id}"></use></svg></div>
				<code>#${id}</code>
			`;
			grid.appendChild(card);
		}

		section.appendChild(grid);
		output.appendChild(section);
	};

	spriteFiles.forEach(renderSprite);
</script>
</body>
</html>
